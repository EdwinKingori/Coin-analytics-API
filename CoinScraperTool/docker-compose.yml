services:
  # PostgreSQL DB(storing data)
  db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    ports:
      - "5435:5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3

  # Redis (celery message broker managing task queue messaging)
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6385:6379"
    volumes:
      - redis_data:/data

  # Django Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: CoinScraperTool
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env

  # Celery Worker (Executes async/background tasks)
  celery:
    build: .
    container_name: celery-Worker
    command: celery -A Coinlytics worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    env_file:
      - .env

  # Celery Beat (Periodic task scheduler — dispatches tasks on the CELERY_BEAT_SCHEDULE)
  # Without this service, no scheduled scraping or log-cleanup tasks fire.
  # Beat writes its last-run state to a local schedule file; the volume mount
  # ensures the file survives container restarts so Beat doesn't re-run tasks
  # that already ran since the last restart.
  celery-beat:
    build: .
    container_name: celery-Beat
    command: celery -A Coinlytics beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
      - celery
    env_file:
      - .env

  # Flower (Real-time Celery task monitoring dashboard — http://localhost:5555)
  # Provides visibility into task queues, worker status, and task history.
  # Basic auth credentials are set via environment so the dashboard is not
  # exposed publicly without a password.
  flower:
    build: .
    container_name: celery-Flower
    command: celery -A Coinlytics flower --port=5555
    ports:
      - "5555:5555"
    volumes:
      - .:/app
    depends_on:
      - redis
      - celery
    env_file:
      - .env

volumes:
  postgres_data:
  redis_data:
